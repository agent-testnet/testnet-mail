limit_req_zone $binary_remote_addr zone=signup:1m rate=6r/m;
limit_req_zone $binary_remote_addr zone=webmail:10m rate=30r/m;
# Brute-force resistance for the operator dashboard login. Applied to the
# whole /dashboard/ location so a slow bursty visit (login + page load)
# fits inside the burst, while sustained traffic from one IP gets 429'd.
limit_req_zone $binary_remote_addr zone=dashboard_login:1m rate=10r/m;
limit_req_status 429;

server_tokens off;
