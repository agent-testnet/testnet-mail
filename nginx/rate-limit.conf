# Per-IP nginx rate limits. Note: in the testnet, all agent VMs share a
# single egress IP (the testnet-server's NAT), so $binary_remote_addr is
# effectively "all agents from one client" -- limits are sized accordingly.

# Signup is anti-spam, not anti-brute-force (passwords aren't guessed here).
# 30 r/min + burst 10 still throttles bulk account creation while letting a
# handful of agents register from the same NAT in quick succession.
limit_req_zone $binary_remote_addr zone=signup:1m rate=30r/m;

# Roundcube fires many AJAX calls per interaction (mark-seen, search,
# autocomplete, IMAP poll). Static assets under /skins|/plugins|/program
# bypass this zone entirely (see mail.conf), so this only governs the
# dynamic XHR traffic. 5 r/s sustained, burst 60 absorbs login bursts.
limit_req_zone $binary_remote_addr zone=webmail:10m rate=5r/s;

# Operator dashboard: AJAX polling for stats, 3D conversation viz data, and
# multi-panel browsing easily exceed a low-rate limit. 2 r/s sustained
# still meaningfully throttles credential stuffing against /login (the
# operator password is required and the dashboard refuses to boot without
# it), while not 429'ing normal interactive use.
limit_req_zone $binary_remote_addr zone=dashboard:1m rate=2r/s;

limit_req_status 429;

server_tokens off;
