<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mail Dashboard{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            theme: {
                colors: {
                    'matrix-black': '#000000',
                    'matrix-green': '#00ff00',
                    'matrix-dark-green': '#00cc00',
                    'matrix-light-green': '#00ff88',
                    'matrix-bg': '#0a0e27',
                    'matrix-border': '#1a2332',
                    'matrix-text': '#00ff00',
                }
            }
        }
    </script>
    <style>
        * {
            font-family: 'Courier New', monospace;
        }
        body {
            background: linear-gradient(135deg, #000000 0%, #0a0e27 50%, #000000 100%);
            color: #00ff00;
            overflow-x: hidden;
        }
        .matrix-glow {
            text-shadow: 0 0 10px #00ff00, 0 0 20px #00aa00, 0 0 30px #008800;
        }
        .matrix-border {
            border-color: #00ff00;
            border-style: solid;
        }
        .matrix-bg {
            background-color: rgba(0, 20, 0, 0.6);
        }
        .matrix-hover:hover {
            background-color: rgba(0, 50, 0, 0.8);
            box-shadow: inset 0 0 20px rgba(0, 255, 0, 0.2);
            transform: scale(1.02);
            transition: all 0.3s ease;
        }
        .matrix-input {
            background-color: rgba(0, 20, 0, 0.8);
            border: 1px solid #00ff00;
            color: #00ff00;
        }
        .matrix-input:focus {
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
            outline: none;
        }
        .matrix-card {
            background-color: rgba(0, 20, 0, 0.6);
            border: 2px solid #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
        }
        .matrix-header {
            background: linear-gradient(90deg, rgba(0, 255, 0, 0.1) 0%, rgba(0, 100, 0, 0.1) 50%, rgba(0, 255, 0, 0.1) 100%);
            border-bottom: 2px solid #00ff00;
        }
        .stat-box {
            background-color: rgba(0, 30, 0, 0.7);
            border-left: 4px solid #00ff00;
        }
        .chart-container {
            position: relative;
            height: 300px;
            background-color: rgba(0, 20, 0, 0.6);
            border: 2px solid #00ff00;
            border-radius: 4px;
            padding: 20px;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-matrix-black">
    <div class="min-h-screen">
        {% block content %}{% endblock %}
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
