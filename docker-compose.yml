x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "4"

services:
  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:15
    container_name: mailserver
    hostname: gmail.com
    env_file: mailserver.env
    environment:
      # Documented contract for the testnet-only outbound policy. These vars
      # are consumed by scripts/deploy.sh to render config/testnet-recipients.pcre
      # and config/testnet-transport (mounted into the container at
      # /tmp/docker-mailserver/). They are passed through here so the values
      # are visible in `docker inspect mailserver` for operators.
      #
      # TESTNET_MAIL_DOMAINS: comma-separated list of additional testnet mail
      #   domains beyond MAIL_DOMAIN, whose recipients are accepted by the
      #   outbound policy (e.g. "outlook.com,yahoo.com").
      # TESTNET_MAIL_RELAYS:  comma-separated list of "domain=ip:port" pairs
      #   that route those peer testnet mail domains to their real public IPs
      #   over direct port-25 SMTP (e.g. "outlook.com=1.2.3.4:25").
      - TESTNET_MAIL_DOMAINS=${TESTNET_MAIL_DOMAINS:-}
      - TESTNET_MAIL_RELAYS=${TESTNET_MAIL_RELAYS:-}
    ports:
      - "0.0.0.0:25:25"
      - "127.0.0.1:143:143"
      - "127.0.0.1:587:587"
    volumes:
      - mail-data:/var/mail/
      - mail-state:/var/mail-state/
      - mail-logs:/var/log/mail/
      - ./config/:/tmp/docker-mailserver/
      - /etc/localtime:/etc/localtime:ro
    networks:
      - mail-net
    restart: unless-stopped
    stop_grace_period: 1m
    healthcheck:
      test: "ss --listening --ipv4 --tcp | grep --silent ':smtp' || exit 1"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    logging: *default-logging

  roundcube:
    image: roundcube/roundcubemail:1.6.10-apache
    container_name: roundcube
    environment:
      - ROUNDCUBEMAIL_DEFAULT_HOST=mailserver
      - ROUNDCUBEMAIL_DEFAULT_PORT=143
      # Use the submission service (port 587) instead of port 25. docker-mailserver
      # only enables SASL on submission/submissions; port 25 is the inter-MTA port
      # and intentionally does not advertise AUTH. Plain SASL is fine here because
      # the connection stays inside the internal mail-net docker network (same
      # trust model as the IMAP/143 wiring above).
      - ROUNDCUBEMAIL_SMTP_SERVER=mailserver
      - ROUNDCUBEMAIL_SMTP_PORT=587
      - ROUNDCUBEMAIL_SKIN=elastic
      - ROUNDCUBEMAIL_PLUGINS=archive,zipdownload,managesieve,account_signup
      - ROUNDCUBEMAIL_UPLOAD_MAX_FILESIZE=25M
      # Pin des_key to a stable value generated and persisted by
      # scripts/deploy.sh. Without this, the entrypoint regenerates a random
      # des_key on every container recreate -- which silently invalidates all
      # logged-in sessions because Roundcube can no longer decrypt the stored
      # IMAP password from $_SESSION. The decrypted-to-empty password then
      # makes rcube_smtp.php skip SMTP AUTH entirely, and the submission
      # service rejects the unauthenticated client with "5.7.1 Client host
      # rejected: Access denied". Pinning the key keeps existing webmail
      # sessions working across deploys.
      - ROUNDCUBEMAIL_DES_KEY=${ROUNDCUBEMAIL_DES_KEY:-}
    volumes:
      - roundcube-db:/var/roundcube/db
      - ./roundcube/custom-config.php:/var/roundcube/config/custom-config.php:ro
      - ./roundcube/plugins/account_signup:/var/www/html/plugins/account_signup:ro
    ports:
      - "127.0.0.1:8080:80"
    networks:
      - mail-net
    depends_on:
      mailserver:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  signup-api:
    build: ./signup-api
    container_name: signup-api
    environment:
      - MAIL_DOMAIN=${MAIL_DOMAIN:-gmail.com}
      - MAIL_CONTAINER=mailserver
      - DOCKER_API=http://docker-proxy:2375
    ports:
      - "127.0.0.1:8081:8081"
    networks:
      - api-net
    depends_on:
      mailserver:
        condition: service_healthy
      docker-proxy:
        condition: service_started
    restart: unless-stopped
    logging: *default-logging

  mail-classifier:
    build: ./mail-classifier
    container_name: mail-classifier
    environment:
      - MAIL_DOMAIN=${MAIL_DOMAIN:-gmail.com}
      - MAILSERVER_HOST=mailserver
      - MAILSERVER_PORT=143
      - CLASSIFIER_DB_PATH=/var/roundcube/db/sqlite.db
      # Backend auto-selection: set exactly one of GEMINI_API_KEY (Vertex AI
      # Express Mode) or OPENROUTER_API_KEY (OpenRouter, OpenAI-compatible).
      # The classifier picks its backend from whichever key is set; setting
      # both is rejected at boot. Defaults of "" make compose tolerate the
      # opposite key being chosen without "var not set" warnings.
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash-lite}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-google/gemini-2.5-flash-lite}
    volumes:
      - roundcube-db:/var/roundcube/db
    networks:
      - mail-net
    depends_on:
      mailserver:
        condition: service_healthy
      roundcube:
        condition: service_started
    restart: unless-stopped
    logging: *default-logging

  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.3
    container_name: docker-proxy
    environment:
      # /containers/{id}/exec is part of the CONTAINERS namespace in
      # docker-socket-proxy, so CONTAINERS must be enabled in addition to EXEC
      # for `signup-api` to create exec instances inside the mailserver. The
      # proxy is bound to the internal api-net only and POST is restricted to
      # exec creation paths via the namespace toggles below.
      POST: 1
      EXEC: 1
      CONTAINERS: 1
      IMAGES: 0
      VOLUMES: 0
      NETWORKS: 0
      NODES: 0
      SERVICES: 0
      SWARM: 0
      TASKS: 0
      SECRETS: 0
      CONFIGS: 0
      BUILD: 0
      AUTH: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - api-net
    restart: unless-stopped
    logging: *default-logging

  dashboard:
    build: ./dashboard
    container_name: dashboard
    environment:
      - FLASK_ENV=production
      - MAIL_DOMAIN=${MAIL_DOMAIN:-gmail.com}
      - MAILSERVER_HOST=mailserver
      # CLASSIFIER_DB_PATH: SQLite file (shared volume with roundcube + mail-classifier)
      # that the dashboard reads classifier_emails rows from to render
      # benign/malicious badges next to each message.
      - CLASSIFIER_DB_PATH=/var/roundcube/db/sqlite.db
      # DASHBOARD_PASSWORD: shared operator password used by the dashboard's
      # login form. Required at container start; the app refuses to boot if
      # empty (so a misconfigured deploy doesn't silently expose data).
      # DASHBOARD_SECRET_KEY: persistent key for signing the Flask session
      # cookie. Generated and persisted on the host by scripts/deploy.sh in
      # the same way ROUNDCUBEMAIL_DES_KEY is, so existing operator sessions
      # survive redeploys.
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:?DASHBOARD_PASSWORD is required}
      - DASHBOARD_SECRET_KEY=${DASHBOARD_SECRET_KEY:?DASHBOARD_SECRET_KEY is required}
    volumes:
      - roundcube-db:/var/roundcube/db
    ports:
      - "127.0.0.1:5000:5000"
    networks:
      - mail-net
    depends_on:
      mailserver:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

networks:
  mail-net:
  api-net:

volumes:
  mail-data:
  mail-state:
  mail-logs:
  roundcube-db:
